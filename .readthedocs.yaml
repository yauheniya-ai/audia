# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: pypi/docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: pypi
      extra_requirements:
        - docs
